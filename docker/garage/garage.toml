# Garage config for the self-host docker-compose `storage` service (and the
# attachments test harness, which mounts this same file). Single node,
# replication factor 1 — this is a one-machine S3, not a cluster.
#
# Secrets deliberately do NOT live here: the container supplies them via the
# GARAGE_RPC_SECRET and GARAGE_ADMIN_TOKEN env vars (see docker-compose.yml).

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
# Must match the server's S3_REGION.
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[admin]
# Bearer-token HTTP API used by the init sidecar (layout/bucket/key setup).
# Not published outside the compose network.
api_bind_addr = "[::]:3903"
